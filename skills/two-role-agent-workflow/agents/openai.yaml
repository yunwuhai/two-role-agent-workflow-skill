interface:
  display_name: "Two-Role Agent Workflow"
  short_description: "Set up planner/executor collaboration with parallel conversations and file-level coordination."
  default_prompt: "When creating a new project, ask whether to adopt the human-first planner/executor workflow. For projects that already use it, confirm whether I am the planner or executor before proceeding, then use project-level AGENTS.md guidance, role docs, conversation-scoped plan/result handoffs, a shared active-conversation and active-file registry, per-turn history, shared conversation memos, small scoped tasks, and Git ownership. Keep the confirmed role locked for the turn; ordinary execution requests do not implicitly switch a planner into executor work. If I want this workflow to become a global default, point me to the optional global instruction templates instead of changing my environment without asking."
